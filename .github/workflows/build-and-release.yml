name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --noconfirm --onefile --windowed --name "ADB Explorer" --hidden-import="PyQt6.QtWidgets" --hidden-import="PyQt6.QtCore" --hidden-import="PyQt6.QtGui" --hidden-import="logging.handlers" --clean --noconsole --log-level=ERROR main.py

      - name: Upload EXE as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ADB-Explorer-${{ github.sha }}
          path: "dist/ADB Explorer.exe"

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.PUSH_TOKEN }}
          file: "dist/ADB Explorer.exe"
          asset_name: ADB-Explorer-${{ github.ref_name }}.exe
          tag: ${{ github.ref }}
          overwrite: true
